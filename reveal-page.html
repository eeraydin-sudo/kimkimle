< !DOCTYPE html><html lang="tr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Kim Kiminle — Büyük Açılış</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" /><style>*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --bg: #1a1410;
    --bg2: #221c16;
    --card: #f5efe4;
    --card-edge: #e0d3bb;
    --ink: #2a1f14;
    --ink-light: #4a3828;
    --amber: #c8843a;
    --amber-lt: #e8a855;
    --cream: #f0e6d0;
    --muted: #7a6a58;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
}

html,
body {
    height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--sans);
    overflow: hidden;
}

/* grain */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
}

/* warm glow */
body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(200, 132, 58, 0.07) 0%, transparent 70%);
    pointer-events: none;
}

.shell {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 580px;
    margin: 0 auto;
    padding: 0 24px;
}

/* ── TOP BAR ── */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 0 16px;
    border-bottom: 1px solid rgba(200, 132, 58, 0.18);
    animation: fadeDown 0.5s ease both;
}

.topbar-left {
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.game-title {
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    color: var(--amber);
    letter-spacing: 0.08em;
    opacity: 0.85;
}

.reveal-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
}

.story-counter {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
}

/* ── MIDDLE ── */
.middle {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 0;
    overflow: hidden;
    position: relative;
}

/* ── Story Card ── */
.story-card {
    background: var(--card);
    border-radius: 4px;
    width: 100%;
    max-width: 480px;
    padding: 44px 48px 40px;
    position: relative;
    box-shadow:
        0 2px 0 var(--card-edge),
        0 5px 0 rgba(0, 0, 0, 0.25),
        0 16px 48px rgba(0, 0, 0, 0.55);
    animation: cardReveal 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
}

/* fold corner */
.story-card::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 30px;
    height: 30px;
    background: linear-gradient(225deg, var(--card-edge) 50%, transparent 50%);
    border-bottom-left-radius: 3px;
}

/* ornamental top line */
.card-ornament {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
}

.ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(42, 31, 20, 0.2));
}

.ornament-line.right {
    background: linear-gradient(90deg, rgba(42, 31, 20, 0.2), transparent);
}

.ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--amber);
    transform: rotate(45deg);
    opacity: 0.6;
    flex-shrink: 0;
}

/* story number badge */
.story-num {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 20px;
    opacity: 0.75;
}

/* ── Story sentences ── */
.story-body {
    display: flex;
    flex-direction: column;
    gap: 0;
}

.story-line {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 0 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(42, 31, 20, 0.07);
    opacity: 0;
    animation: lineReveal 0.45s ease forwards;
}

.story-line:last-child {
    border-bottom: none;
}

.line-question {
    font-family: var(--serif);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0.7;
    padding-top: 2px;
    line-height: 1.4;
}

.line-answer {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.45;
    font-style: italic;
}

/* staggered reveal delays */
.story-line:nth-child(1) {
    animation-delay: 0.10s;
}

.story-line:nth-child(2) {
    animation-delay: 0.22s;
}

.story-line:nth-child(3) {
    animation-delay: 0.34s;
}

.story-line:nth-child(4) {
    animation-delay: 0.46s;
}

.story-line:nth-child(5) {
    animation-delay: 0.58s;
}

.story-line:nth-child(6) {
    animation-delay: 0.70s;
}

.story-line:nth-child(7) {
    animation-delay: 0.82s;
}

/* assembled sentence at bottom */
.story-full {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid rgba(42, 31, 20, 0.12);
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink-light);
    font-style: italic;
    opacity: 0;
    animation: fadeIn 0.6s 1.1s ease forwards;
}

/* ── HOST badge ── */
.host-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0.6;
    margin-bottom: 6px;
    font-family: var(--sans);
}

.host-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 2s infinite;
}

/* ── BOTTOM NAV ── */
.bottom {
    padding: 16px 0 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.5s 0.3s ease both;
}

.nav-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
}

.nav-btn {
    padding: 14px 20px;
    background: transparent;
    border: 1.5px solid rgba(200, 132, 58, 0.3);
    border-radius: 6px;
    font-family: var(--serif);
    font-size: 16px;
    color: var(--cream);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    white-space: nowrap;
}

.nav-btn:hover {
    border-color: rgba(200, 132, 58, 0.7);
    background: rgba(200, 132, 58, 0.06);
    transform: translateY(-1px);
}

.nav-btn:active {
    transform: translateY(1px);
}

.nav-btn:disabled {
    opacity: 0.25;
    cursor: default;
    transform: none;
}

.nav-btn.prev {
    text-align: right;
}

.nav-btn.next {
    text-align: left;
}

.nav-dots {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
}

.nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(200, 132, 58, 0.2);
    cursor: pointer;
    transition: background 0.25s, transform 0.2s;
}

.nav-dot.active {
    background: var(--amber);
    transform: scale(1.3);
}

/* end row */
.end-row {
    display: flex;
    gap: 10px;
}

.end-btn {
    flex: 1;
    padding: 14px;
    border-radius: 6px;
    font-family: var(--serif);
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, opacity 0.2s;
    border: none;
}

.end-btn.replay {
    background: var(--amber);
    color: var(--ink);
    font-weight: 600;
    box-shadow: 0 2px 0 rgba(0, 0, 0, 0.25), 0 6px 20px rgba(200, 132, 58, 0.2);
}

.end-btn.replay:hover {
    background: var(--amber-lt);
    transform: translateY(-1px);
}

.end-btn.quit {
    background: transparent;
    border: 1.5px solid rgba(200, 132, 58, 0.25);
    color: var(--muted);
}

.end-btn.quit:hover {
    border-color: rgba(200, 132, 58, 0.5);
    color: var(--cream);
}

/* only visible when all stories shown */
.end-row {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
}

.end-row.visible {
    opacity: 1;
    pointer-events: all;
}

/* host note */
.host-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    font-family: var(--serif);
}

/* ── ANIMATIONS ── */
@keyframes fadeDown {
    from {
        opacity: 0;
        transform: translateY(-12px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(16px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }

    to {
        opacity: 1;
    }
}

@keyframes cardReveal {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
    }

    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes lineReveal {
    from {
        opacity: 0;
        transform: translateX(-8px);
    }

    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes pulse {

    0%,
    100% {
        opacity: 0.4;
        transform: scale(1);
    }

    50% {
        opacity: 1;
        transform: scale(1.4);
    }
}

/* ── Responsive ── */
@media (max-width: 480px) {
    .shell {
        padding: 0 16px;
    }

    .story-card {
        padding: 28px 24px 24px;
    }

    .line-answer {
        font-size: 16px;
    }
}

</style></head><body><div class="shell">< !-- TOP BAR --><header class="topbar"><div class="topbar-left"><span class="game-title">Kim Kiminle</span><span class="reveal-label">Büyük Açılış</span></div><span class="story-counter" id="storyCounter">Hikaye 1 / 5</span></header>< !-- MIDDLE --><main class="middle"><div class="story-card" id="storyCard"><div class="card-ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line right"></div></div><div class="story-num" id="storyNum">Hikaye 1</div><div class="story-body" id="storyBody">< !-- filled by JS --></div><div class="story-full" id="storyFull"></div></div></main>< !-- BOTTOM --><footer class="bottom"><div class="nav-row"><button class="nav-btn prev" id="prevBtn" disabled>← Önceki</button><div class="nav-dots" id="navDots"></div><button class="nav-btn next" id="nextBtn">Sonraki →</button></div><div class="end-row" id="endRow"><button class="end-btn replay">Tekrar Oyna</button><button class="end-btn quit">Çık</button></div><div class="host-badge"><span class="host-dot"></span>Hikaye geçişleri host tarafından kontrol edilir </div></footer></div><script> // ── Demo data ──

const stories=[ {
    lines: [ {
        q: 'Kim?', a: 'Ahmet Bey'
    }

    ,
    {
    q: 'Kiminle?', a: 'komşusunun kedisiyle'
}

,
{
q: 'Nerede?', a: 'IKEA\'nın mum bölümünde'
}

,
{
q: 'Ne zaman?', a: 'sabahın dördünde'
}

,
{
q: 'Ne yapıyor?', a: 'tango dansı yapıyor'
}

,
{
q: 'Kim görmüş?', a: 'güvenlik kamerası'
}

,
{
q: 'Ne demiş?', a: '"Hayat kısa, dans et."'
}

,
]
}

,
{
lines: [ {
    q: 'Kim?', a: 'Buse Hanım'
}

,
{
q: 'Kiminle?', a: 'eski sınıf arkadaşıyla'
}

,
{
q: 'Nerede?', a: 'doktorun bekleme odasında'
}

,
{
q: 'Ne zaman?', a: 'Pazar öğleden sonra'
}

,
{
q: 'Ne yapıyor?', a: 'selfie çekiyor'
}

,
{
q: 'Kim görmüş?', a: 'hasta yakınları'
}

,

}

,
]
}

,
{
lines: [ {
    q: 'Kim?', a: 'Caner Abi'
}

,
{
q: 'Kiminle?', a: 'fırıncıyla'
}

,
{
q: 'Nerede?', a: 'çatı katında'
}

,
{
q: 'Ne zaman?', a: 'kargo gelmeden önce'
}

,
{
q: 'Ne yapıyor?', a: 'dedikodu yapıyor'
}

,
{
q: 'Kim görmüş?', a: 'güvercin'
}

,
{
q: 'Ne demiş?', a: '"Kimseye söyleme ama…"'
}

]
}

,
{
lines: [ {
    q: 'Kim?', a: 'Deniz'
}

,
{
q: 'Kiminle?', a: 'robot süpürgeyle'
}

,
{
q: 'Nerede?', a: 'alışveriş merkezinin altında'
}

,
{
q: 'Ne zaman?', a: 'tatil dönüşü'
}

,
{
q: 'Ne yapıyor?', a: 'şiir okuyor'
}

,

}

,
{

}

let current=0;
const IS_HOST=true; // demo: this user is host

const storyCard=document.getElementById('storyCard');
const storyNum=document.getElementById('storyNum');
const storyBody=document.getElementById('storyBody');
const storyFull=document.getElementById('storyFull');
const storyCounter=document.getElementById('storyCounter');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const navDots=document.getElementById('navDots');
const endRow=document.getElementById('endRow');

// Build nav dots
stories.forEach((_, i)=> {
        const d=document.createElement('div');
        d.className='nav-dot' + (i===0 ? ' active' : '');

        d.addEventListener('click', ()=> {
                if (IS_HOST) goTo(i);
            });
        navDots.appendChild(d);
    });

function buildStory(idx) {
    const s=stories[idx];

    // Card re-animate
    storyCard.style.animation='none';
    storyCard.offsetHeight;
    storyCard.style.animation='cardReveal 0.55s cubic-bezier(0.16,1,0.3,1) both';

    storyNum.textContent=`Hikaye $ {
        idx+1
    }

    `;

    storyCounter.textContent=`Hikaye $ {
        idx+1
    }

    / $ {
        stories.length
    }

    `;

    // Lines
    storyBody.innerHTML='';

    s.lines.forEach((line, i)=> {
            const row=document.createElement('div');
            row.className='story-line';
            row.style.animationDelay=(0.08 + i * 0.12) + 's';

            row.innerHTML=` <span class="line-question" >$ {
                line.q
            }

            </span> <span class="line-answer" >$ {
                line.a
            }

            </span> `;
            storyBody.appendChild(row);
        });

    // Full assembled sentence
    const full=s.lines.map(l=> l.a).join(', ')+'.';
    storyFull.textContent=full;
    storyFull.style.animation='none';
    storyFull.offsetHeight;
    storyFull.style.animation='fadeIn 0.6s 1.0s ease forwards';
    storyFull.style.opacity='0';

    // Dots
    document.querySelectorAll('.nav-dot').forEach((d, i)=> {
            d.classList.toggle('active', i===idx);
        });

    // Buttons
    prevBtn.disabled=idx===0;
    nextBtn.disabled=idx===stories.length - 1;

    // End row
    if (idx===stories.length - 1) {
        endRow.classList.add('visible');
    }

    else {
        endRow.classList.remove('visible');
    }
}

function goTo(idx) {
    current=idx;
    buildStory(current);
    // → ws.send({ type: 'change_story', index: idx });
}

prevBtn.addEventListener('click', ()=> {
        if (current > 0) goTo(current - 1);
    });

nextBtn.addEventListener('click', ()=> {
        if (current < stories.length - 1) goTo(current + 1);
    });

// Initial render
buildStory(0);
</script></body></html>
